<svg width="680" height="260" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Loan request lifecycle</title>
<desc>A member applies for a loan, the admin reviews it, and the result is either approval with an installment schedule or rejection with a reason sent back to the member.</desc>
<defs>
  <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Apply -->
<g>
  <rect x="20" y="98" width="140" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="90" y="120" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Member applies</text>
  <text x="90" y="138" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">amount + duration</text>
</g>

<line x1="160" y1="126" x2="208" y2="126" stroke="#888780" stroke-width="1" marker-end="url(#arrow2)"/>

<!-- Admin review -->
<g>
  <rect x="210" y="98" width="140" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="280" y="120" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#412402">Admin reviews</text>
  <text x="280" y="138" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#633806">sees client history</text>
</g>

<line x1="350" y1="115" x2="400" y2="60" stroke="#888780" stroke-width="1" marker-end="url(#arrow2)"/>
<line x1="350" y1="137" x2="400" y2="192" stroke="#888780" stroke-width="1" marker-end="url(#arrow2)"/>

<!-- Approve -->
<g>
  <rect x="400" y="32" width="150" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="475" y="54" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#173404">Approved</text>
  <text x="475" y="72" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#27500A">account credited</text>
</g>

<!-- Reject -->
<g>
  <rect x="400" y="164" width="150" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="475" y="186" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#501313">Rejected</text>
  <text x="475" y="204" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#791F1F">reason recorded</text>
</g>

<line x1="550" y1="60" x2="600" y2="60" stroke="#3B6D11" stroke-width="1" marker-end="url(#arrow2)"/>
<line x1="550" y1="192" x2="600" y2="192" stroke="#A32D2D" stroke-width="1" marker-end="url(#arrow2)"/>

<!-- Schedule -->
<g>
  <rect x="560" y="20" width="0" height="0"/>
</g>
<text x="595" y="40" font-family="sans-serif" font-size="12" fill="#27500A">Installment</text>
<text x="595" y="56" font-family="sans-serif" font-size="12" fill="#27500A">schedule created</text>

<text x="595" y="180" font-family="sans-serif" font-size="12" fill="#791F1F">Member</text>
<text x="595" y="196" font-family="sans-serif" font-size="12" fill="#791F1F">notified</text>

</svg>
