<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Kaargoosha microservice architecture</title>
<desc>A member talks to the Bale Bot, which publishes messages over RabbitMQ to the FastAPI worker. The worker reads and writes the database and pushes notifications back through RabbitMQ to the bot.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Member -->
<g>
  <rect x="40" y="40" width="140" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="110" y="68" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Member</text>
</g>

<!-- Bale Bot -->
<g>
  <rect x="270" y="40" width="200" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="370" y="64" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Bale Bot</text>
  <text x="370" y="84" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">Kaargoosha-BaleBot</text>
</g>

<!-- Member <-> Bot -->
<line x1="180" y1="68" x2="268" y2="68" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

<!-- RabbitMQ -->
<g>
  <rect x="270" y="180" width="200" height="64" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="370" y="204" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#412402">RabbitMQ</text>
  <text x="370" y="224" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#633806">publish / consume</text>
</g>

<!-- Bot <-> RabbitMQ -->
<line x1="370" y1="104" x2="370" y2="178" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<text x="382" y="142" font-family="sans-serif" font-size="12" fill="#633806">loan.create</text>
<text x="382" y="158" font-family="sans-serif" font-size="12" fill="#633806">notify.loan_approved</text>

<!-- FastAPI worker -->
<g>
  <rect x="250" y="320" width="240" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="370" y="344" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">FastAPI worker</text>
  <text x="370" y="364" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#085041">Kaargoasha-FastAPI</text>
</g>

<!-- RabbitMQ <-> FastAPI -->
<line x1="370" y1="244" x2="370" y2="318" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

<!-- Database -->
<g>
  <rect x="540" y="320" width="100" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="590" y="352" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53">Database</text>
</g>

<!-- FastAPI -> Database -->
<line x1="490" y1="352" x2="538" y2="352" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

</svg>
